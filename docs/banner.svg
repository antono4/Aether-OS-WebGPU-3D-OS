<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#12121a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    
    <!-- Cyan Glow -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00d9ff" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Magenta Glow -->
    <filter id="magentaGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ff00ff" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glass Effect -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>
  
  <!-- Floating Particles -->
  <g fill="#00d9ff" opacity="0.6">
    <circle cx="100" cy="80" r="2"/>
    <circle cx="250" cy="120" r="1.5"/>
    <circle cx="400" cy="60" r="2"/>
    <circle cx="550" cy="140" r="1"/>
    <circle cx="700" cy="90" r="2.5"/>
    <circle cx="850" cy="130" r="1.5"/>
    <circle cx="1000" cy="70" r="2"/>
    <circle cx="1100" cy="110" r="1"/>
  </g>
  <g fill="#ff00ff" opacity="0.5">
    <circle cx="150" cy="320" r="2"/>
    <circle cx="300" cy="350" r="1.5"/>
    <circle cx="500" cy="330" r="2"/>
    <circle cx="750" cy="360" r="1"/>
    <circle cx="900" cy="340" r="2.5"/>
    <circle cx="1050" cy="320" r="1.5"/>
  </g>
  
  <!-- Central Orbital Rings -->
  <g transform="translate(600, 200)" fill="none" stroke-width="1.5">
    <ellipse rx="180" ry="60" stroke="#00d9ff" stroke-opacity="0.3" transform="rotate(-20)"/>
    <ellipse rx="180" ry="60" stroke="#ff00ff" stroke-opacity="0.3" transform="rotate(40)"/>
    <ellipse rx="180" ry="60" stroke="#00ff88" stroke-opacity="0.3" transform="rotate(80)"/>
  </g>
  
  <!-- Central Core -->
  <circle cx="600" cy="200" r="80" fill="url(#glassGradient)" stroke="#00d9ff" stroke-width="2" filter="url(#cyanGlow)"/>
  <circle cx="600" cy="200" r="50" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
  <circle cx="600" cy="200" r="30" fill="#00d9ff" fill-opacity="0.3" filter="url(#cyanGlow)"/>
  
  <!-- Orbiting Nodes -->
  <g filter="url(#cyanGlow)">
    <circle cx="450" cy="160" r="15" fill="#1a1a2e" stroke="#00d9ff" stroke-width="2"/>
    <text x="450" y="165" text-anchor="middle" fill="#00d9ff" font-size="8" font-family="monospace">3D</text>
  </g>
  <g filter="url(#magentaGlow)">
    <circle cx="750" cy="160" r="15" fill="#1a1a2e" stroke="#ff00ff" stroke-width="2"/>
    <text x="750" y="165" text-anchor="middle" fill="#ff00ff" font-size="8" font-family="monospace">AI</text>
  </g>
  <g filter="url(#cyanGlow)">
    <circle cx="600" cy="290" r="15" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
    <text x="600" y="295" text-anchor="middle" fill="#00ff88" font-size="8" font-family="monospace">MEM</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="bold" font-family="system-ui, sans-serif">
    <tspan fill="#00d9ff">AETHER</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ff00ff">OS</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="75" text-anchor="middle" fill="#a0a0b0" font-size="14" font-family="system-ui, sans-serif">
    Spatial Operating System • Zero-App Architecture • Associative Memory
  </text>
  
  <!-- Bottom Info -->
  <g transform="translate(600, 380)" text-anchor="middle" font-family="monospace" font-size="11">
    <text fill="#00d9ff">THREE.JS</text>
    <text x="-200" fill="#606070">•</text>
    <text fill="#ff00ff">VITE</text>
    <text x="200" fill="#606070">•</text>
    <text fill="#00ff88">TYPESCRIPT</text>
  </g>
</svg>

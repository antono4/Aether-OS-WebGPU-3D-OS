<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="url(#grad)" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.6"/>
  <circle cx="16" cy="10" r="1.5" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="21" cy="14" r="1" fill="#ff00ff" filter="url(#glow)" opacity="0.8"/>
  <circle cx="19" cy="20" r="1.2" fill="#00f5ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="13" cy="18" r="0.8" fill="#ff00ff" filter="url(#glow)" opacity="0.6"/>
  <line x1="16" y1="10" x2="21" y2="14" stroke="url(#grad)" stroke-width="0.5" opacity="0.4"/>
  <line x1="21" y1="14" x2="19" y2="20" stroke="url(#grad)" stroke-width="0.5" opacity="0.4"/>
  <line x1="19" y1="20" x2="13" y2="18" stroke="url(#grad)" stroke-width="0.5" opacity="0.4"/>
  <line x1="13" y1="18" x2="16" y2="10" stroke="url(#grad)" stroke-width="0.5" opacity="0.4"/>
</svg>
